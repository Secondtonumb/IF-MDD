# Hyperparameters toggles
prefix: ""

lab_enc_file: /home/m64000/work/IF-MDD/exp_l2arctic/wavlm_large_None_PhnMonoSSL_ottc_confEnc_kernal/save/label_encoder.txt
ctc_loss_type: None
wandb_project: "l2arctic"
encoder_type: "conformer"  # Options: None, "conformer", "zipformer", "rvq"
# Wandb Tags
tags:
    - SSL_LLM
    - CTC
    - l2arctic

## SSL features Selection
pretrained_models_path: pretrained_models/
# select pretrained SSL models

# Pretrained Component Loading
load_pretrained_components: true      # Enable loading specific components from pretrained model
pretrained_model_path: /home/m64000/work/IF-MDD/pretrained_models/ottc_audioencoder/
components_to_load: ["ssl", "post_ssl_encoder"] # Components to load: ssl (necessary), ctc_branch (to monitor CTC performance)

freeze_loaded_components: true        # Whether to freeze the loaded components, # 768

perceived_ssl_model: "wavlm_large" # in pretrained_models
canonical_ssl_model: Null

# # models hidden size, varies by model
ENCODER_DIM: 1024
LLM_DIM: 4096

# # How to fuse the features
feature_fusion: "mono"        # Options: "mono" for single ssl, "dual_ssl_enc" for dual ssl encoder, "dual_loss" for single SSL dual ssl loss
ctc_weight: 0               # 降低 CTC 权重，增加 LLM 分支权重 (CE loss 权重 = 0.7)
# Input files
# Data files
data_folder_save: "./data"
train_annotation: !ref <data_folder_save>/train-train.json
valid_annotation: !ref <data_folder_save>/train-dev.json
test_annotation: !ref <data_folder_save>/test.json

use_prompt: true
prompt_type: "text"        # "soft" 可学习的向量 | "discrete" 离散 token
prompt_len: 16             # 增加到 16，提供更多上下文（原 8）
prompt_init: "normal"      # "normal" 更适合 LLM，标准差为 0.02
prompt_dropout: 0.1        # 添加 dropout 防止过拟合
prompt_ids: null           # soft prompt 不需要 ids

# Extra data
train_annotation_extra: !ref <data_folder_save>/train-train_with_extra.json
use_extra_train_data: False

evaluate_key: "CTC_PER" # use "mpd_f1_seq" for Transformer decoder path best mpd f1
                            # "PER_seq" for Transformer decoder's best error rate
                            # "PER" for ctc path best error rate
                            # "mpd_f1" for ctc path best mpd f1
max_save_models: 3 # Maximum number of saved models for each metrics 

# output files
output_folder: !ref exp_l2arctic_LLM/<perceived_ssl_model>_<feature_fusion>_<prefix>
per_file: !ref <output_folder>/per.txt
mpd_file: !ref <output_folder>/mpd.txt
save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt

# Training Target 
training_target: "target" # "target": deduplicated canonical phoneme sequence; "target_with_repeats": with repeats
                          # "canonical"
                          # "perceived": deduplicated perceived phoneme sequence
# Modules (SpeechBrain lobes)
modules:
    perceived_ssl: !ref <perceived_ssl>
    ssl_proj: !ref <ssl_proj>
    ConformerEncoder: !ref <ConformerEncoder>
    projector: !ref <projector>
    LLM: !ref <LLM>
    ctc_lin: !ref <ctc_lin>
    lm_weight: !ref <lm_weight>

audio_encoder_modules: !new:torch.nn.Sequential
    - !ref <perceived_ssl>
    - !ref <ssl_proj>
    - !ref <ConformerEncoder>

post_encoder_modules: !new:torch.nn.ModuleList
    - [!ref <ssl_proj>, !ref <ctc_lin>]
    
# Audio Encoder
perceived_ssl: !apply:trainer.AutoSSLoader.AutoSSLLoader
    model_name: !ref <perceived_ssl_model>
    freeze: !ref <freeze_perceived_ssl>
    freeze_feature_extractor: !ref <freeze_perceived_feature_extractor>
    save_path: !ref <pretrained_models_path>
    output_all_hiddens: False
preceived_ssl_emb_layer: -1

# Projector 
post_encoder_reduction_factor: 1
# mem_proj_cnn: !new:torch.nn.Conv1d
#     in_channels: !ref <dnn_neurons>
#     out_channels: !ref <LLM_DIM>
#     kernel_size: !ref <post_encoder_reduction_factor>
#     stride: !ref <post_encoder_reduction_factor>
#     padding: 0
    
# projector:  !new:torch.nn.Sequential
#     - !ref <mem_proj_cnn>
#     - !new:torch.nn.ReLU
#     - !new:torch.nn.BatchNorm1d
#         num_features: !ref <LLM_DIM>

projector: !new:models.projector.EncoderProjectorCov1d
    encoder_projector_ds_rate: !ref <post_encoder_reduction_factor>
    encoder_dim: !ref <dnn_neurons>
    llm_dim: !ref <LLM_DIM>


# Verbose for Audio Encoder
ctc_head_input: "enc_ctc"  # Options: "ssl" for SSL features; "enc_ctc" for encoder output; "enc_llm" for LLM encoder input

ssl_proj: !new:torch.nn.Sequential
  - !new:speechbrain.lobes.models.VanillaNN.VanillaNN
     input_shape: [null, null, !ref <ENCODER_DIM>]
     activation: !ref <activation>
     dnn_blocks: !ref <dnn_layers>
     dnn_neurons: !ref <dnn_neurons>
  - !new:torch.nn.LayerNorm
     normalized_shape: !ref <dnn_neurons>

kernel_size: 7
attention_type: "RoPEMHA" # "RelPosMHAXL"
ConformerEncoder: !new:speechbrain.lobes.models.transformer.Conformer.ConformerEncoder
      num_layers: 2
      nhead: 8
      d_ffn: !ref <dnn_neurons>
      d_model: !ref <dnn_neurons>
      dropout: 0.1
      kernel_size: !ref <kernel_size>
      attention_type: !ref <attention_type>

# CTC linear layer
ctc_lin:  !new:speechbrain.nnet.linear.Linear
    input_size: !ref <dnn_neurons>
    n_neurons: !ref <output_neurons>  # 40 phonemes + 1 blank + 1 err

# lm in OTTC branch, not use for training
lm_weight: !new:speechbrain.nnet.linear.Linear
    input_size: !ref <dnn_neurons>
    n_neurons: 1  # 40 phonemes + 1 blank + 1 err

# LLM
# LLM_model: "meta-llama/Llama-3.1-8B"
LLM_model: "meta-llama/Meta-Llama-3-8B-Instruct"
# LLM_model: "Qwen/Qwen2-Audio-7B-Instruct"
# LLM_model: "meta-llama/Llama-3.1-8B"
# LLM_model: "meta-llama/Llama-4-Scout-17B-16E-Instruct"

# 统计跟踪器
llm_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.losses.kldiv_loss
        reduction: batch

# LLaMA model with LoRA config
use_lora: True
rank: 16
lora_config:
    r: !ref <rank>
    alpha: 16
    dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

LLM: !apply:trainer.AutoLLMLoader.AutoLLMLoader
    model_name: !ref <LLM_model>
    use_lora: !ref <use_lora>
    lora_config: !ref <lora_config>

LLM_tokenizer: !apply:trainer.AutoLLMLoader.AutoLLMTokenizer
    model_name: !ref <LLM_model>

# Model parameters
activation: !name:torch.nn.LeakyReLU
dnn_layers: 2
dnn_neurons: 384  
freeze_perceived_ssl: False
freeze_canonical_ssl: False
freeze_perceived_feature_extractor: True  # freeze the CNN extractor in wav2vec
freeze_canonical_feature_extractor: True         # Freeze Whisper encoder?

log_softmax: !new:speechbrain.nnet.activations.Softmax
    apply_log: True

ctc_cost: !name:speechbrain.nnet.losses.ctc_loss
    blank_index: !ref <blank_index>

# Outputs
output_neurons: 44 # l2arctic: 40phns(sil)+err+blank + eos + bos =44
blank_index: 0

# ctc_branch: !new:torch.nn.ModuleList
#   - [!ref <audio_encoder>, !ref <ctc_lin>]

# model: !new:torch.nn.ModuleList
#     - [!ref <perceived_ssl>, !ref <enc>, !ref <ctc_lin>, !ref <LLM>, !ref <enc_ctc>] # !ref <phn_embed>, !ref <phn_head>]

model: !new:torch.nn.ModuleList
    - [!ref <perceived_ssl>, !ref <ssl_proj>, !ref <projector>, !ref <LLM>, !ref <ctc_lin>] # !ref <phn_embed>, !ref <phn_head>]

trainable_model: !new:torch.nn.ModuleList
    - [!ref <projector>, !ref <LLM>] # !ref <phn_embed>, !ref <phn_head>]

# model: !new:torch.nn.ModuleList
#     - [!ref <projector>, !ref <LLM>, !ref <ctc_lin>] # !ref <phn_embed>, !ref <phn_head>]

adam_opt_class: !name:torch.optim.Adam
    lr: !ref <lr>

checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
    checkpoints_dir: !ref <save_folder>
    recoverables:
        model: !ref <model>
        counter: !ref <epoch_counter>
    allow_partial_load: True

augmentation: !new:speechbrain.augment.time_domain.SpeedPerturb
    orig_freq: !ref <sample_rate>
    speeds: [95, 100, 105]

epoch_counter: !new:speechbrain.utils.epoch_loop.EpochCounter
    limit: !ref <number_of_epochs>

train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
    save_file: !ref <train_log>

ctc_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.losses.ctc_loss
        blank_index: !ref <blank_index>
        reduction: batch

per_stats: !name:speechbrain.utils.metric_stats.ErrorRateStats


# # TIMIT
# timit_local_data_folder: "/common/db/TIMIT"  # Path to TIMIT datase

seed: 3047
__set_seed: !apply:torch.manual_seed [!ref <seed>]

# training parameters
number_of_epochs: 100
valid_search_interval: 2
batch_size: 8
lr: 0.0002  # 从 0.0003 降低，防止 LLM loss 上升
sorting: ascending
sample_rate: 16000
gradient_accumulation: 1
grad_clip: 1.0  # 新增：梯度裁剪，防止梯度爆炸
lr_pretrained: 0.00001
lr_prompt: 0.001  # 新增：prompt 专用学习率（可以比主模型高一些）

# Mix-Precision Training
auto_mix_prec: true
# or
precision: fp16         # 支持 "fp32"、"fp16" 或 "bf16"
eval_precision: fp32    # 推理同样切换到 FP16

# Dataloader options
train_dataloader_opts:
    batch_size: !ref <batch_size>
    pin_memory: True

valid_dataloader_opts:
    batch_size: !ref <batch_size>
    pin_memory: True
    
test_dataloader_opts:
    batch_size: !ref <batch_size>
    pin_memory: True

pretrainer: !new:speechbrain.utils.parameter_transfer.Pretrainer
    collect_in: !ref <save_folder>/
    loadables:
        model: !ref <model>

AudioEncoderPretrainer : !new:speechbrain.utils.parameter_transfer.Pretrainer
    collect_in: !ref <pretrained_model_path>
    loadables:
        perceived_ssl: !ref <perceived_ssl>
        post_encoder_modules: !ref <post_encoder_modules>
    paths:
        perceived_ssl: !ref <pretrained_model_path>/perceived_ssl.ckpt
        post_encoder_modules: !ref <pretrained_model_path>/model.ckpt

decoding_function: !name:speechbrain.decoders.ctc_greedy_decode
    blank_id: !ref <blank_index>

tokenizer: !new:speechbrain.dataio.encoder.TextEncoder
    load_from_file: utils/label_encoder.txt