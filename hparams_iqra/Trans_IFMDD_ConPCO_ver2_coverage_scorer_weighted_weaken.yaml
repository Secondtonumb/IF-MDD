# Hyperparameters toggles

# coverage_scorer = CoverageScorer(vocab_size=output_vocab_size, weight=1.5)
# speechbrain.decoders.scorer.CoverageScorer
coverage_scorer: !new:speechbrain.decoders.scorer.CoverageScorer
    vocab_size: !ref <output_neurons>
    threshold: 0.5

prefix: ""

## SSL features Selection
pretrained_models_path: pretrained_models/

lab_enc_file: /mount/minesharedisk/kevingenghaopeng/work/IF-MDD/exp_iqra/wavlm_large_None_PhnMonoSSL_crottc_confEnc/save/label_encoder.txt
ctc_loss_type: "crottc"  # Options: "ctc", "ottc", "crctc"
encoder_type: "conformer"  # Options: None, "conformer", "zipformer", "rvq"

wandb_project: "iqra_extra"
# Wandb Tags
tags:
    - Trans_IFMDD_ConPCO
    - crottc
    - ConformerEncoder
    - iqra_extra

# Pretrained Component Loading
load_pretrained_components:      # Enable loading specific components from pretrained model
pretrained_model_path: "/mount/minesharedisk/kevingenghaopeng/work/IF-MDD/pretrained_models/ottc_k7_RoPE_TTS_FT"
# components_to_load: ["ssl", "encoder"] # Components to load: ssl, encoder, enc_projection, ctc_head, decoder
components_to_load: ["ssl"]
freeze_loaded_components: true        # Whether to freeze the loaded components, # 768

# select pretrained SSL models
perceived_ssl_model: "wavlm_large" # in pretrained_models

# # models hidden size, varies by model
ENCODER_DIM: 1024

# # How to fuse the features
feature_fusion: "mono"        # Options: "mono" for single ssl, "dual_ssl_enc" for dual ssl encoder, "dual_loss" for single SSL dual ssl loss
blend_alpha: 0.5              # If using "blend" fusion

# Input files
# Data files
data_folder_save: "/mount/minesharedisk/sharedfiles/dataset/data_iqra_extra_is26"
train_annotation: !ref <data_folder_save>/iqra_extra_is26_train_aligned.json
valid_annotation: !ref <data_folder_save>/iqra_extra_is26_dev_aligned.json
test_annotation: !ref <data_folder_save>/iqra_extra_is26_test_aligned.json
# Extra data
train_annotation_extra: !ref <data_folder_save>/train-train_with_extra.json
# infer_annotation: !ref <data_folder_save>/iqra_extra_is26_test_aligned.json
infer_annotation: /mount/minesharedisk/sharedfiles/dataset/data_iqra/iqra_test.json
inference_output_file: !ref <output_folder>/IFMDD_ConPCO_inference_results_<ctc_decode_weight>.txt
# Extra data

use_extra_train_data: False

# generate training id for output folder
# generate_training_id: !apply:trainer.generate_training_id.generate_training_id [!ref <perceived_ssl_model_id>, !ref <canonical_ssl_model_id>, !ref <feature_fusion>, !ref <prefix>]

# evaluate_key: "PER_seq" # use "mpd_f1_seq" for Transformer decoder path best mpd f1
evaluate_key: "mpd_f1_seq"
                            # "PER_seq" for Transformer decoder's best error rate
                            # "PER" for ctc path best error rate
                            # "mpd_f1" for ctc path best mpd f1
max_save_models: 3 # Maximum number of saved models for each metrics 

# output files
output_folder: !ref exp_iqra/<perceived_ssl_model>_<feature_fusion>_<prefix>
per_file: !ref <output_folder>/per_<evaluate_key>.txt
mpd_file: !ref <output_folder>/mpd_<evaluate_key>.txt
save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt

on_training_test_wer_folder: !ref <output_folder>/on_training_test_wer
on_training_test_mpd_folder: !ref <output_folder>/on_training_test_mpd

# Modules (SpeechBrain lobes)
modules:
    perceived_ssl: !ref <perceived_ssl>
    enc: !ref <enc>
    ctc_lin: !ref <ctc_lin>
    TransASR: !ref <TransASR>
    d_out: !ref <d_out>
    phn_emb: !ref <phn_emb>
    
    fuse_net: !ref <fuse_net>
    fuse_net_dec: !ref <fuse_net>  # separate fuse net for dec

    mispro_head: !ref <mispro_head>
    mispro_head_binary_out: !ref <mispro_head_binary_out>
    mispro_head_class_out: !ref <mispro_head_class_out>
    mem_proj: !ref <mem_proj>
    mem_proj_cnn_post_enc: !ref <mem_proj_cnn_post_enc>
    mem_proj_dec: !ref <mem_proj_dec>
    fuse_proj: !ref <fuse_proj>

    # Projections for ConPCO Loss
    conpco_proj_audio_feat: !ref <conpco_proj_audio_feat>
    conpco_proj_perceived_phn_feat: !ref <conpco_proj_perceived_phn_feat>

    ConformerEncoder: !ref <ConformerEncoder>

# phn_emb_TransEnc: !ref <phn_emb_TransEnc>

perceived_ssl: !apply:trainer.AutoSSLoader.AutoSSLLoader
    model_name: !ref <perceived_ssl_model>
    freeze: !ref <freeze_perceived_ssl>
    freeze_feature_extractor: !ref <freeze_perceived_feature_extractor>
    save_path: !ref <pretrained_models_path>
    output_all_hiddens: False

preceived_ssl_emb_layer: -1

# canonical_ssl: !apply:trainer.AutoSSLoader.AutoSSLLoader
#     model_name: !ref <canonical_ssl_model>
#     freeze: !ref <freeze_canonical_ssl>
#     freeze_feature_extractor: !ref <freeze_perceived_feature_extractor>
#     save_path: !ref <pretrained_models_path>
vnn: !new:speechbrain.lobes.models.VanillaNN.VanillaNN
     input_shape: [null, null, !ref <ENCODER_DIM>]
     activation: !ref <activation>
     dnn_blocks: !ref <dnn_layers>
     dnn_neurons: !ref <dnn_neurons>

enc: !new:torch.nn.Sequential
  - !ref <vnn>
  - !new:torch.nn.LayerNorm
     normalized_shape: !ref <dnn_neurons>
    
ctc_lin:  !new:speechbrain.nnet.linear.Linear
    input_size: !ref <dnn_neurons>
    n_neurons: !ref <output_neurons>  # 40 phonemes + 1 blank + 1 err

# pre_encoder
# custom_src_module: !new:speechbrain.nnet.containers.LengthsCapableSequential
#     - !ref <perceived_ssl>
#     - !ref <enc>

# ctc_head_targeting
ctc_head_target: "perceived"  # Options: "perceived", "canonical"

# Seq head targeting
decoder_target: "target" # Options: "target" "perceived";  len(perceived) = len(canonical), aligned
# decoder_target: "perceived" # Options: "target" "perceived";  len(perceived) = len(canonical), aligned

# decoding with mispronunciation detection strategy
allow_mispro_threshold: false
mispro_threshold: -0.8

# confidence thresholding
allow_confidence_thresholding: false
confidence_threshold: -0.8

# mispro_assembled decoding
apply_mispro_to_hyps: False

# Test Decoding mode
valid_decode_mode: "AR"  # Options: "AR" for autoregressive beam search, this does not need Cano Emb
                        # "teacher_forcing" Use Cano Emb for ground truth length.
test_decode_mode: "AR"  # Options: "AR" for autoregressive beam search, this does not need Cano Emb
                        # "teacher_forcing" Use Cano Emb for ground truth length.
# eval with silence
eval_with_silence: true

# transformer
nhead: 8
d_ffn: 1024
num_encoder_layers: 2
num_decoder_layers: 2
encoder_module: conformer # transformer, conformer, branchformer
# attention_type: RoPEMHA # regularMHA， RoPEMHA (with conformer)
causal: False
# activation: gelu

# TransASR: !new:speechbrain.lobes.models.transformer.TransformerASR.TransformerASR

kernel_size: 7
attention_type: "RoPEMHA"  # Options: "standard", "RoPE"

ConformerEncoder: !new:speechbrain.lobes.models.transformer.Conformer.ConformerEncoder
      num_layers: 2
      nhead: 8
      d_ffn: !ref <dnn_neurons>
      d_model: !ref <dnn_neurons>
      dropout: 0.0
      kernel_size: !ref <kernel_size>
      attention_type: !ref <attention_type>
      

TransASR: !new:trainer.ConPCO_TransASR.ConPCO_TransformerASR
    tgt_vocab: !ref <output_neurons>
    input_size: !ref <dnn_neurons>
    d_model: !ref <dnn_neurons>
    nhead: !ref <nhead>
    num_encoder_layers: !ref <num_encoder_layers>
    num_decoder_layers: !ref <num_decoder_layers>
    d_ffn: !ref <d_ffn>
    output_hidden_states: False
    normalize_before: True
    kernel_size: !ref <kernel_size>
    encoder_module: !ref <encoder_module>
    attention_type: !ref <attention_type>
    causal: !ref <causal>
    custom_src_module: !ref <enc>
    custom_encoder: !ref <ConformerEncoder>
    # custom_tgt_module: !ref <phn_emb>
    # activation: !ref <activation>

# get TransASR's decoder
TransASR_decoder: !apply:getattr
    - !ref <TransASR>
    - "decoder"

d_out: !new:speechbrain.nnet.linear.Linear
    input_size: !ref <dnn_neurons>
    n_neurons: !ref <output_neurons>  # 40 phonemes + 1 blank + 1 err

# Text prompt module
phn_emb_head: !new:torch.nn.Embedding
        num_embeddings: !ref <output_neurons>
        embedding_dim: !ref <dnn_neurons>

phn_emb: !new:torch.nn.Sequential
    - !ref <phn_emb_head>
    - !new:torch.nn.LayerNorm
        normalized_shape: !ref <dnn_neurons>

# phn_emb: !new:torch.nn.Sequential
#     - !ref <phn_emb_head>
#     - !new:torch.nn.LayerNorm
#         normalized_shape: !ref <dnn_neurons>

# phn_emb_TransEnc: !new:speechbrain.lobes.models.transformer.Transformer.TransformerEncoder
#     num_layers: 2
#     nhead: !ref <nhead>
#     d_ffn: !ref <d_ffn>
#     d_model: !ref <dnn_neurons>
#     attention_type: "RelPosMHAXL"
#     causal: false

# Mispro class:
Correct: 0
Substitution: 1
Deletion: 2
Insertion: 3

# mispro_head: For mispronunciation detection
mispro_cnn1: !new:torch.nn.Conv1d
    in_channels: !ref <dnn_neurons>
    out_channels: 128
    kernel_size: 5
    stride: 1
    padding: 2

mispro_cnn2: !new:torch.nn.Conv1d
    in_channels: 128
    out_channels: 64
    kernel_size: 5
    stride: 1
    padding: 2

mispro_head_binary_out: !new:torch.nn.Conv1d
    in_channels: 64
    out_channels: 1
    kernel_size: 1
    stride: 1
    padding: 0

mispro_head_class_out: !new:torch.nn.Linear
    in_features: 64
    out_features: 4

mispro_head: !new:torch.nn.Sequential
  - !ref <mispro_cnn1>
  - !new:torch.nn.BatchNorm1d
      num_features: 128
  - !new:torch.nn.GELU {}
  - !ref <mispro_cnn2>
  - !new:torch.nn.BatchNorm1d
      num_features: 64

# Memory projection (applied to encoder memory before feeding into fuse_net)
# Set mem_proj_out_dim to match fuse_net d_model (defaults to <dnn_neurons>)
mem_proj_out_dim: !ref <dnn_neurons>

# With RelPosMHAXL, avoid adding absolute positional encoding on memory to prevent mixing abs+rel encodings.
mem_proj_linear: !new:torch.nn.Linear
    in_features: !ref <mem_proj_out_dim>
    out_features: !ref <dnn_neurons>
    # bias: true

# mapping Transformer encoder's output to fuse_net's d_model
mem_proj: !new:torch.nn.Sequential
  - !ref <mem_proj_linear>
  - !new:torch.nn.LayerNorm
      normalized_shape: !ref <mem_proj_out_dim>
  - !new:torch.nn.ReLU

# A downsampling CNN after Transformer encoder to reduce memory length
# Helps guide attention to focus on important parts
post_encoder_reduction_factor: 4
# mem_proj_cnn: !new:torch.nn.Conv1d
#     in_channels: !ref <dnn_neurons>
#     out_channels: !ref <dnn_neurons>
#     kernel_size: !ref <post_encoder_reduction_factor>
#     stride: !ref <post_encoder_reduction_factor>
#     padding: 0
    
# mem_proj_cnn_post_enc:  !new:torch.nn.Sequential
#     - !ref <mem_proj_cnn>
#     - !new:torch.nn.BatchNorm1d
#         num_features: !ref <dnn_neurons>

mem_proj_cnn_post_enc:  !new:models.projector.EncoderProjectorCov1d
    encoder_projector_ds_rate: !ref <post_encoder_reduction_factor>
    encoder_dim: !ref <dnn_neurons>
    llm_dim: !ref <dnn_neurons>

# mapping Transformer encoder's output to fuse_net's d_model
mem_proj_dec: !new:torch.nn.Sequential
  - !ref <mem_proj_linear>
  - !new:torch.nn.LayerNorm
      normalized_shape: !ref <mem_proj_out_dim>
  - !new:torch.nn.ReLU

# memory
# Fusion network
fuse_enc_or_dec: "encdec"
fuse_net_layers: 2

fuse_net: !new:speechbrain.lobes.models.transformer.Transformer.TransformerDecoder
    num_layers: !ref <fuse_net_layers>
    nhead: !ref <nhead>
    d_ffn: !ref <d_ffn>
    d_model: !ref <dnn_neurons>
    activation: !ref <activation>
    attention_type: "RelPosMHAXL"
    causal: true

fuse_net_dec: !new:speechbrain.lobes.models.transformer.Transformer.TransformerDecoder
    num_layers: !ref <fuse_net_layers>
    nhead: !ref <nhead>
    d_ffn: !ref <d_ffn>
    d_model: !ref <dnn_neurons>
    activation: !ref <activation>
    attention_type: "RelPosMHAXL"
    causal: true

# concat the fuse features from enc and dec
fuse_proj: !new:torch.nn.Linear
    in_features: !ref <dnn_neurons> + <dnn_neurons>  # if concat enc and dec fuse features
    out_features: !ref <dnn_neurons>
    # bias: true

# ─── Autoregressive Greedy Searcher ──────────────────────────────────────
# valid_search: !new:speechbrain.decoders.seq2seq.S2STransformerBeamSearcher
#   modules: [!ref <TransASR>, !ref <d_out>]
#   bos_index: !ref <bos_index>
#   eos_index: !ref <eos_index>
#   min_decode_ratio: 0.0
#   max_decode_ratio: 1.0
#   length_normalization: True
#   using_eos_threshold: False
#   beam_size: 5
#   scorer: !ref <scorer>

valid_search: !new:speechbrain.decoders.seq2seq.S2STransformerBeamSearcher
  modules: [!ref <TransASR>, !ref <d_out>]
  bos_index: !ref <bos_index>
  eos_index: !ref <eos_index>
  min_decode_ratio: 0.0
  max_decode_ratio: 0.3
  length_normalization: False
  using_eos_threshold: False
  beam_size: 1
  # scorer: !ref <scorer>

test_search: !new:speechbrain.decoders.seq2seq.S2STransformerBeamSearcher
  modules: [!ref <TransASR>, !ref <d_out>]
  bos_index: !ref <bos_index>
  eos_index: !ref <eos_index>
  min_decode_ratio: 0.0
  max_decode_ratio: 0.35
  temperature: 1.0
  length_normalization: False
  using_eos_threshold: False
  beam_size: 15
  scorer: !ref <scorer>
  # scorer: !ref <scorer>

ctc_scorer: !new:speechbrain.decoders.CTCScorer
    ctc_fc: !ref <ctc_lin>
    blank_index: !ref <blank_index>
    eos_index: !ref <eos_index>

scorer: !new:speechbrain.decoders.ScorerBuilder
   full_scorers: [!ref <ctc_scorer>, !ref <coverage_scorer>]
   weights:
     ctc: !ref <ctc_decode_weight>
     coverage: !ref <coverage_weight>
# ────────────────────────────────────────────────────────────────────────

# Model parameters
activation: !name:torch.nn.LeakyReLU
dnn_layers: 2
dnn_neurons: 384  
freeze_perceived_ssl: False
freeze_canonical_ssl: False
freeze_perceived_feature_extractor: True  # freeze the CNN extractor in wav2vec
freeze_canonical_feature_extractor: True  # Freeze Whisper encoder?

log_softmax: !new:speechbrain.nnet.activations.Softmax
    apply_log: True

ctc_weight: 0.0
ctc_decode_weight: 0.5
coverage_weight: 2.0

ctc_cost: !name:speechbrain.nnet.losses.ctc_loss
    blank_index: !ref <blank_index>

# seq_cost: !name:speechbrain.nnet.losses.kldiv_loss
#     reduction: batchmean
#     label_smoothing: 0.1

seq_cost_weights: !apply:torch.Tensor.to
    - !new:torch.Tensor
        - [
            1.0,      # 0: <blank>
            2.0,      # 1: <eos>
            0.5,      # 2: <sil> - error_rate=100.00%
            1.0,      # 3: y
            1.0,      # 4: a
            1.0,      # 5: f
            1.0,      # 6: q
            1.0,      # 7: A
            1.0,      # 8: h
            1.0,      # 9: w
            1.0,      # 10: l
            1.0,      # 11: ii
            1.0,      # 12: H
            1.0,      # 13: $
            1.0,      # 14: r
            1.0,      # 15: n
            1.0,      # 16: aa
            1.0,      # 17: d
            1.0,      # 18: <
            1.0,      # 19: i
            1.0,      # 20: s
            1.0,      # 21: u
            0.5,      # 22: j - error_rate=11.40%
            0.5,      # 23: z - error_rate=35.07%
            1.0,      # 24: m
            1.0,      # 25: b
            1.0,      # 26: AA
            1.0,      # 27: Z - error_rate=10.10%
            1.0,      # 28: I
            1.0,      # 29: t
            1.0,      # 30: k
            1.0,      # 31: g
            1.0,      # 32: E
            1.0,      # 33: ll
            1.0,      # 34: uu
            0.5,   # 35: S - error_rate=18.92%
            0.5,   # 36: * - error_rate=11.42%
            0.5,   # 37: ^ - error_rate=14.04%
            1.0,      # 38: UU
            1.0,      # 39: zz
            1.0,      # 40: x
            0.5,   # 41: D - error_rate=10.34%
            1.0,      # 42: mm
            1.0,      # 43: ss
            1.0,      # 44: EE
            1.0,      # 45: ww
            1.0,      # 46: nn
            1.0,      # 47: U
            1.0,      # 48: T
            1.0,      # 49: **
            1.0,      # 50: bb
            1.0,      # 51: qq
            0.5,   # 52: dd - error_rate=35.85%
            1.0,      # 53: rr
            1.0,      # 54: ZZ
            1.0,      # 55: $$
            1.0,      # 56: jj
            1.0,      # 57: kk
            1.0,      # 58: SS
            1.0,      # 59: tt
            1.0,      # 60: yy
            1.0,      # 61: ^^
            1.0,      # 62: TT
            1.0,      # 63: xx
            1.0,      # 64: ff
            1.0,      # 65: DD
            1.0,      # 66: II
            1.0,      # 67: hh
            1.0,      # 68: HH
            1.0,      # 69: <bos>
            1.0,      # 70: (reserved)
            ]
    - "cuda:0"

seq_cost: !name:speechbrain.nnet.losses.nll_loss
    reduction: batchmean
    label_smoothing: 0.1
    weight: !ref <seq_cost_weights>

# Mispro detection loss
mispro_cost_bin: !name:speechbrain.nnet.losses.bce_loss
    reduction: batchmean
    pos_weight: !apply:torch.Tensor.to
        - !new:torch.Tensor
            - [2.0]
        - "cuda:0"

mispro_cost_cls: !name:speechbrain.nnet.losses.kldiv_loss
    reduction: batchmean

# guided attention cost： speechbrain.nnet.loss.guidedattn_loss.GuidedAttentionLoss
sigma: 0.4 # smaller sigma force model to learn diagnostic features
ga_cost: !name:speechbrain.nnet.loss.guidedattn_loss.GuidedAttentionLoss
    sigma: !ref <sigma>

# ConPCO Loss

ConPCO_dim: 32
dummy_linear: !new:torch.nn.Linear
    in_features: !ref <dnn_neurons>
    out_features: !ref <ConPCO_dim>
dummy_LayerNorm: !new:torch.nn.LayerNorm
    normalized_shape: !ref <ConPCO_dim>

# whether apply dec_out with positional embedding for ConPCO, default: False
conpco_use_dec_pos_emb_on_audio_feat: True

conpco_proj_audio_feat: !new:torch.nn.Sequential
  - !ref <dummy_linear>
  - !new:torch.nn.GELU
  # - !new:torch.nn.Dropout
  - !new:torch.nn.Linear
      in_features: !ref <ConPCO_dim>
      out_features: !ref <ConPCO_dim>
  # - !new:torch.nn.Dropout
  # - !ref <dummy_LayerNorm>
    
conpco_proj_perceived_phn_feat: !new:torch.nn.Sequential
  - !ref <dummy_linear>
  - !new:torch.nn.GELU
  - !new:torch.nn.Linear
  # - !new:torch.nn.Dropout
      in_features: !ref <ConPCO_dim>
      out_features: !ref <ConPCO_dim>
  # - !ref <dummy_LayerNorm>

conpco_lambda_d_phn: 0.5
conpco_lambda_t_phn: 0.1
conpco_lambda_clap_t2a: 0.5
conpco_margin: 1.0

conpco_cost: !new:utils.ConPCO_norm.ContrastivePhonemicOrdinalRegularizer
    lambda_d_phn: !ref <conpco_lambda_d_phn>
    lambda_t_phn: !ref <conpco_lambda_t_phn>
    lambda_clap_t2a: !ref <conpco_lambda_clap_t2a>
    margin: !ref <conpco_margin>
    ignore_index: !ref <blank_index>


conpco_stats: !name:speechbrain.utils.metric_stats.MultiMetricStats
    metric: !ref <conpco_cost>
    batch_eval: True

# Outputs
output_neurons: 71 # l2arctic: 40phns(sil)+err+blank=42
blank_index: 0
bos_index: 69
eos_index: 1

model: !new:torch.nn.ModuleList
    - [
     !ref <enc>,
     !ref <ctc_lin>,        
     !ref <TransASR>,
     !ref <phn_emb>,
     !ref <fuse_net>,
     !ref <fuse_net_dec>,
     !ref <mispro_head>,
     !ref <mispro_head_binary_out>,
     !ref <mispro_head_class_out>,
     !ref <d_out>,
     !ref <mem_proj>,
     !ref <mem_proj_cnn_post_enc>,
     !ref <mem_proj_dec>,
     !ref <fuse_proj>,
     !ref <conpco_proj_audio_feat>,
     !ref <conpco_proj_perceived_phn_feat>
     ]
# !ref <phn_emb_TransEnc>,
# !ref <ctc_lin>,

trainable_model: !new:torch.nn.ModuleList
    - [
     !ref <TransASR_decoder>,
     !ref <phn_emb>,
     !ref <fuse_net>,
     !ref <fuse_net_dec>,
     !ref <mispro_head>,
     !ref <mispro_head_binary_out>,
     !ref <mispro_head_class_out>,
     !ref <d_out>,
     !ref <mem_proj>,
     !ref <mem_proj_cnn_post_enc>,
     !ref <mem_proj_dec>,
     !ref <fuse_proj>,
     !ref <conpco_proj_audio_feat>,
     !ref <conpco_proj_perceived_phn_feat>
     ]
     # !ref <enc>,
     # !ref <ctc_lin>,        
     # !ref <TransASR>,

adam_opt_class: !name:torch.optim.Adam
    lr: !ref <lr>

pretrained_opt_class: !name:torch.optim.Adam
    lr: !ref <lr_pretrained>

checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
    checkpoints_dir: !ref <save_folder>
    recoverables:
        model: !ref <model>
        perceived_ssl: !ref <perceived_ssl>
        counter: !ref <epoch_counter>
    allow_partial_load: True

checkpointer_recover: !new:speechbrain.utils.checkpoints.Checkpointer
    checkpoints_dir: !ref <pretrained_model_path>
    recoverables:
        perceived_ssl: !ref <perceived_ssl>
    allow_partial_load: True
    #  model: !ref <model>

augmentation: !new:speechbrain.augment.time_domain.SpeedPerturb
    orig_freq: !ref <sample_rate>
    speeds: [95, 100, 105]

epoch_counter: !new:speechbrain.utils.epoch_loop.EpochCounter
    limit: !ref <number_of_epochs>

train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
    save_file: !ref <train_log>

ctc_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.losses.ctc_loss
        blank_index: !ref <blank_index>
        reduction: batch

seqlabel_stats: !name:speechbrain.utils.metric_stats.MetricStats
    # metric: !name:speechbrain.nnet.losses.kldiv_loss
    metric: !name:speechbrain.nnet.losses.nll_loss
        reduction: batch
        label_smoothing: 0.1

mispro_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.losses.bce_loss
        reduction: batch
        pos_weight: !apply:torch.Tensor.to
            - !new:torch.Tensor
                - [2.0]
            - "cuda:0"

mispro_class_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.losses.kldiv_loss
        reduction: batch

ga_stats: !name:speechbrain.utils.metric_stats.MetricStats
    metric: !name:speechbrain.nnet.loss.guidedattn_loss.GuidedAttentionLoss
        sigma: !ref <sigma>

per_stats: !name:speechbrain.utils.metric_stats.ErrorRateStats


seed: 3047
__set_seed: !apply:torch.manual_seed [!ref <seed>]

# training parameters
number_of_epochs: 500
valid_search_interval: 1
batch_size: 24
lr: 0.0002
sorting: ascending
# sorting: descending
# sorting: random
sample_rate: 16000
gradient_accumulation: 1
lr_pretrained: 0.00001

# Mix-Precision Training
auto_mix_prec: true
# or
precision: fp16         # 支持 "fp32"、"fp16" 或 "bf16"

# CTC-based Encoder/SSL Freezing
enable_ctc_freezing: false    # Enable automatic freezing when CTC converges
ctc_patience: 5                # Number of epochs to wait before freezing (increased from 5)
ctc_threshold_factor: 1.1     # Threshold = min_ctc_loss * this_factor (tighter threshold)

# Metric-based Encoder/SSL Freezing
enable_metric_freezing: false          # Enable automatic freezing when validation metrics converge
freezing_metric: "both"                # Options: "PER", "F1", "both"
metric_patience: 4                   # Number of epochs to wait before freezing
per_threshold_factor: 1.05            # Threshold = min_PER * this_factor (for PER, lower is better)
f1_threshold_factor: 0.95             # Threshold = max_F1 * this_factor (for F1, higher is better)
min_epochs_before_metric_freeze: 20   # Minimum epochs before considering metric-based freezing

# Dataloader options
train_dataloader_opts:
    batch_size: !ref <batch_size>
    num_workers: 6
    
valid_dataloader_opts:
    batch_size: !ref <batch_size>
    num_workers: 6

test_dataloader_opts:
    batch_size: !ref <batch_size>
    num_workers: 6

noam_annealing: !new:speechbrain.nnet.schedulers.NewBobScheduler
    initial_value: !ref <lr>
    annealing_factor: 0.8
    improvement_threshold: 0.0025
    patient: 0

# Plot attention for fusion
plot_attention: False
plot_attention_interval: 10
valid_attention_plot_dir: !ref <output_folder>/valid_attention_plots
test_attention_plot_dir: !ref <output_folder>/test_attention_plots

# ConPCO visualization
plot_conpco_interval: 10
plot_conpco: False
conpco_plot_dir: !ref <output_folder>/conpco_plots
max_phones: 10
conPCO_plot_show_audio_centroid: False
conPCO_plot_show_audio_scatter: True
conPCO_plot_show_phoneme_centroid: True
conPCO_plot_show_phoneme_scatter: False

encoder: !new:torch.nn.ModuleList
    - [ !ref <enc>, !ref <ConformerEncoder>, !ref <ctc_lin>]

resume_from_folder: "/mount/minesharedisk/kevingenghaopeng/work/IF-MDD/pretrained_models/ottc_k7_RoPE_TTS_FT"

pretrainer: !new:speechbrain.utils.parameter_transfer.Pretrainer
    collect_in: !ref <resume_from_folder>/
    loadables:
        perceived_ssl: !ref <perceived_ssl>
        model: !ref <encoder>